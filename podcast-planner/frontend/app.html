<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Episode Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideIn { animation: slideIn 0.3s ease-out; }
        .status-draft { background: #f3f4f6; color: #4b5563; }
        .status-scripted { background: #dbeafe; color: #1d4ed8; }
        .status-published { background: #dcfce7; color: #16a34a; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Initial Data
        const initialEpisodes = [
            { id: '1', title: 'AI in Healthcare', topic: 'Machine Learning Applications', episodeNumber: 1, plannedDate: '2026-05-01', status: 'Draft', guestId: '1' },
            { id: '2', title: 'Future of Web Development', topic: 'Web Technologies', episodeNumber: 2, plannedDate: '2026-05-15', status: 'Scripted', guestId: '2' },
            { id: '3', title: 'Startup Success Stories', topic: 'Entrepreneurship', episodeNumber: 3, plannedDate: '2026-05-22', status: 'Published', guestId: null },
        ];

        const initialGuests = [
            { id: '1', name: 'Dr. Sarah Chen', bio: 'AI researcher with 15 years of experience in healthcare applications.', areaOfExpertise: 'AI & Healthcare' },
            { id: '2', name: 'Marcus Johnson', bio: 'Full-stack developer and tech educator.', areaOfExpertise: 'Web Development' },
            { id: '3', name: 'Emily Rodriguez', bio: 'Serial entrepreneur and startup advisor.', areaOfExpertise: 'Entrepreneurship' },
        ];

        // Status Badge Component
        function StatusBadge({ status, onClick }) {
            const colors = {
                'Draft': 'status-draft',
                'Scripted': 'status-scripted',
                'Published': 'status-published'
            };
            return (
                <span 
                    onClick={onClick}
                    className={`px-3 py-1 rounded-full text-sm font-medium cursor-pointer hover:opacity-80 transition ${colors[status]}`}
                >
                    {status}
                </span>
            );
        }

        // Modal Component
        function Modal({ isOpen, onClose, title, children }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg animate-slideIn">
                        <div className="flex items-center justify-between p-4 border-b">
                            <h2 className="text-xl font-semibold">{title}</h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
                        </div>
                        <div className="p-4">{children}</div>
                    </div>
                </div>
            );
        }

        // Toast Notification
        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, []);
            
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };
            
            return (
                <div className={`fixed bottom-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg animate-slideIn flex items-center space-x-2`}>
                    <span>{type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span>
                    <span>{message}</span>
                </div>
            );
        }

        // Episode Form Component
        function EpisodeForm({ episode, guests, onSave, onCancel }) {
            const [formData, setFormData] = useState(episode || {
                title: '',
                topic: '',
                episodeNumber: '',
                plannedDate: '',
                status: 'Draft',
                guestId: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave({
                    ...formData,
                    id: episode?.id || Date.now().toString(),
                    episodeNumber: parseInt(formData.episodeNumber)
                });
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                        <input
                            type="text"
                            required
                            value={formData.title}
                            onChange={(e) => setFormData({...formData, title: e.target.value})}
                            className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Enter episode title"
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Topic *</label>
                        <input
                            type="text"
                            required
                            value={formData.topic}
                            onChange={(e) => setFormData({...formData, topic: e.target.value})}
                            className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Main topic or theme"
                        />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Episode Number *</label>
                            <input
                                type="number"
                                required
                                min="1"
                                value={formData.episodeNumber}
                                onChange={(e) => setFormData({...formData, episodeNumber: e.target.value})}
                                className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Planned Date *</label>
                            <input
                                type="date"
                                required
                                value={formData.plannedDate}
                                onChange={(e) => setFormData({...formData, plannedDate: e.target.value})}
                                className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            />
                        </div>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Guest (Optional)</label>
                        <select
                            value={formData.guestId || ''}
                            onChange={(e) => setFormData({...formData, guestId: e.target.value || null})}
                            className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        >
                            <option value="">-- Select a guest --</option>
                            {guests.map(guest => (
                                <option key={guest.id} value={guest.id}>{guest.name} - {guest.areaOfExpertise}</option>
                            ))}
                        </select>
                    </div>
                    {episode && (
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Status</label>
                            <select
                                value={formData.status}
                                onChange={(e) => setFormData({...formData, status: e.target.value})}
                                className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            >
                                <option value="Draft">Draft</option>
                                <option value="Scripted">Scripted</option>
                                <option value="Published">Published</option>
                            </select>
                        </div>
                    )}
                    <div className="flex justify-end space-x-3 pt-4">
                        <button type="button" onClick={onCancel} className="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                            {episode ? 'Update Episode' : 'Create Episode'}
                        </button>
                    </div>
                </form>
            );
        }

        // Guest Form Component
        function GuestForm({ guest, onSave, onCancel }) {
            const [formData, setFormData] = useState(guest || {
                name: '',
                bio: '',
                areaOfExpertise: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSave({
                    ...formData,
                    id: guest?.id || Date.now().toString()
                });
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Name *</label>
                        <input
                            type="text"
                            required
                            value={formData.name}
                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                            className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Guest full name"
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Bio *</label>
                        <textarea
                            required
                            rows={3}
                            value={formData.bio}
                            onChange={(e) => setFormData({...formData, bio: e.target.value})}
                            className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="Short biography"
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Area of Expertise *</label>
                        <input
                            type="text"
                            required
                            value={formData.areaOfExpertise}
                            onChange={(e) => setFormData({...formData, areaOfExpertise: e.target.value})}
                            className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                            placeholder="e.g., AI, Web Development, Marketing"
                        />
                    </div>
                    <div className="flex justify-end space-x-3 pt-4">
                        <button type="button" onClick={onCancel} className="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</button>
                        <button type="submit" className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                            {guest ? 'Update Guest' : 'Add Guest'}
                        </button>
                    </div>
                </form>
            );
        }

        // Dashboard Stats
        function DashboardStats({ episodes }) {
            const stats = {
                total: episodes.length,
                draft: episodes.filter(e => e.status === 'Draft').length,
                scripted: episodes.filter(e => e.status === 'Scripted').length,
                published: episodes.filter(e => e.status === 'Published').length,
            };

            return (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div className="bg-white rounded-xl p-4 shadow-sm border">
                        <p className="text-gray-500 text-sm">Total Episodes</p>
                        <p className="text-3xl font-bold text-gray-800">{stats.total}</p>
                    </div>
                    <div className="bg-white rounded-xl p-4 shadow-sm border">
                        <p className="text-gray-500 text-sm">Draft</p>
                        <p className="text-3xl font-bold text-gray-600">{stats.draft}</p>
                    </div>
                    <div className="bg-white rounded-xl p-4 shadow-sm border">
                        <p className="text-gray-500 text-sm">Scripted</p>
                        <p className="text-3xl font-bold text-blue-600">{stats.scripted}</p>
                    </div>
                    <div className="bg-white rounded-xl p-4 shadow-sm border">
                        <p className="text-gray-500 text-sm">Published</p>
                        <p className="text-3xl font-bold text-green-600">{stats.published}</p>
                    </div>
                </div>
            );
        }

        // Main App
        function App() {
            const [episodes, setEpisodes] = useState(initialEpisodes);
            const [guests, setGuests] = useState(initialGuests);
            const [activeTab, setActiveTab] = useState('episodes');
            const [showEpisodeModal, setShowEpisodeModal] = useState(false);
            const [showGuestModal, setShowGuestModal] = useState(false);
            const [editingEpisode, setEditingEpisode] = useState(null);
            const [editingGuest, setEditingGuest] = useState(null);
            const [toast, setToast] = useState(null);
            const [statusFilter, setStatusFilter] = useState('all');

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
            };

            // Episode CRUD
            const handleSaveEpisode = (episode) => {
                if (editingEpisode) {
                    setEpisodes(episodes.map(e => e.id === episode.id ? episode : e));
                    showToast('Episode updated successfully');
                } else {
                    setEpisodes([...episodes, episode]);
                    showToast('Episode created successfully');
                }
                setShowEpisodeModal(false);
                setEditingEpisode(null);
            };

            const handleDeleteEpisode = (id) => {
                if (confirm('Are you sure you want to delete this episode?')) {
                    setEpisodes(episodes.filter(e => e.id !== id));
                    showToast('Episode deleted');
                }
            };

            const handleStatusChange = (episode) => {
                const statusFlow = ['Draft', 'Scripted', 'Published'];
                const currentIndex = statusFlow.indexOf(episode.status);
                const nextStatus = statusFlow[(currentIndex + 1) % statusFlow.length];
                setEpisodes(episodes.map(e => e.id === episode.id ? {...e, status: nextStatus} : e));
                showToast(`Status changed to ${nextStatus}`);
            };

            // Guest CRUD
            const handleSaveGuest = (guest) => {
                if (editingGuest) {
                    setGuests(guests.map(g => g.id === guest.id ? guest : g));
                    showToast('Guest updated successfully');
                } else {
                    setGuests([...guests, guest]);
                    showToast('Guest added successfully');
                }
                setShowGuestModal(false);
                setEditingGuest(null);
            };

            const handleDeleteGuest = (id) => {
                if (confirm('Are you sure you want to delete this guest?')) {
                    // Also unlink from episodes
                    setEpisodes(episodes.map(e => e.guestId === id ? {...e, guestId: null} : e));
                    setGuests(guests.filter(g => g.id !== id));
                    showToast('Guest deleted');
                }
            };

            const getGuestName = (guestId) => {
                const guest = guests.find(g => g.id === guestId);
                return guest ? guest.name : '—';
            };

            const filteredEpisodes = statusFilter === 'all' 
                ? episodes 
                : episodes.filter(e => e.status === statusFilter);

            return (
                <div className="min-h-screen bg-gray-100">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-4 py-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-2xl font-bold flex items-center gap-2">
                                        🎙️ Podcast Episode Planner
                                    </h1>
                                    <p className="text-purple-100 mt-1">Manage your episodes and guests</p>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Tab Navigation */}
                    <div className="bg-white border-b shadow-sm">
                        <div className="max-w-7xl mx-auto px-4">
                            <nav className="flex space-x-8">
                                <button
                                    onClick={() => setActiveTab('episodes')}
                                    className={`py-4 px-1 border-b-2 font-medium transition ${
                                        activeTab === 'episodes'
                                            ? 'border-purple-500 text-purple-600'
                                            : 'border-transparent text-gray-500 hover:text-gray-700'
                                    }`}
                                >
                                    📺 Episodes ({episodes.length})
                                </button>
                                <button
                                    onClick={() => setActiveTab('guests')}
                                    className={`py-4 px-1 border-b-2 font-medium transition ${
                                        activeTab === 'guests'
                                            ? 'border-purple-500 text-purple-600'
                                            : 'border-transparent text-gray-500 hover:text-gray-700'
                                    }`}
                                >
                                    👥 Guests ({guests.length})
                                </button>
                            </nav>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 py-6">
                        {activeTab === 'episodes' && (
                            <div>
                                <DashboardStats episodes={episodes} />
                                
                                {/* Actions Bar */}
                                <div className="flex flex-wrap items-center justify-between gap-4 mb-6">
                                    <div className="flex items-center gap-2">
                                        <span className="text-gray-600">Filter:</span>
                                        <select
                                            value={statusFilter}
                                            onChange={(e) => setStatusFilter(e.target.value)}
                                            className="px-3 py-2 border rounded-lg bg-white"
                                        >
                                            <option value="all">All Status</option>
                                            <option value="Draft">Draft</option>
                                            <option value="Scripted">Scripted</option>
                                            <option value="Published">Published</option>
                                        </select>
                                    </div>
                                    <button
                                        onClick={() => { setEditingEpisode(null); setShowEpisodeModal(true); }}
                                        className="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 flex items-center gap-2"
                                    >
                                        <span>+</span> New Episode
                                    </button>
                                </div>

                                {/* Episodes Table */}
                                <div className="bg-white rounded-xl shadow-sm border overflow-hidden">
                                    <table className="w-full">
                                        <thead className="bg-gray-50">
                                            <tr>
                                                <th className="text-left px-4 py-3 text-sm font-semibold text-gray-600">#</th>
                                                <th className="text-left px-4 py-3 text-sm font-semibold text-gray-600">Title</th>
                                                <th className="text-left px-4 py-3 text-sm font-semibold text-gray-600 hidden md:table-cell">Topic</th>
                                                <th className="text-left px-4 py-3 text-sm font-semibold text-gray-600 hidden lg:table-cell">Guest</th>
                                                <th className="text-left px-4 py-3 text-sm font-semibold text-gray-600">Status</th>
                                                <th className="text-left px-4 py-3 text-sm font-semibold text-gray-600 hidden md:table-cell">Date</th>
                                                <th className="text-right px-4 py-3 text-sm font-semibold text-gray-600">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {filteredEpisodes.length === 0 ? (
                                                <tr>
                                                    <td colSpan={7} className="px-4 py-8 text-center text-gray-500">
                                                        No episodes found. Create your first episode!
                                                    </td>
                                                </tr>
                                            ) : (
                                                filteredEpisodes.map(episode => (
                                                    <tr key={episode.id} className="hover:bg-gray-50">
                                                        <td className="px-4 py-3">
                                                            <span className="bg-purple-100 text-purple-700 px-2 py-1 rounded font-medium text-sm">
                                                                {episode.episodeNumber}
                                                            </span>
                                                        </td>
                                                        <td className="px-4 py-3 font-medium">{episode.title}</td>
                                                        <td className="px-4 py-3 text-gray-600 hidden md:table-cell">{episode.topic}</td>
                                                        <td className="px-4 py-3 text-gray-600 hidden lg:table-cell">{getGuestName(episode.guestId)}</td>
                                                        <td className="px-4 py-3">
                                                            <StatusBadge 
                                                                status={episode.status} 
                                                                onClick={() => handleStatusChange(episode)}
                                                            />
                                                        </td>
                                                        <td className="px-4 py-3 text-gray-600 hidden md:table-cell">{episode.plannedDate}</td>
                                                        <td className="px-4 py-3 text-right">
                                                            <button
                                                                onClick={() => { setEditingEpisode(episode); setShowEpisodeModal(true); }}
                                                                className="text-blue-600 hover:text-blue-800 px-2"
                                                            >
                                                                ✏️
                                                            </button>
                                                            <button
                                                                onClick={() => handleDeleteEpisode(episode.id)}
                                                                className="text-red-600 hover:text-red-800 px-2"
                                                            >
                                                                🗑️
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>

                                <p className="text-sm text-gray-500 mt-4">
                                    💡 Tip: Click on status badge to cycle through: Draft → Scripted → Published
                                </p>
                            </div>
                        )}

                        {activeTab === 'guests' && (
                            <div>
                                {/* Actions Bar */}
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-xl font-semibold text-gray-800">Guest Directory</h2>
                                    <button
                                        onClick={() => { setEditingGuest(null); setShowGuestModal(true); }}
                                        className="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 flex items-center gap-2"
                                    >
                                        <span>+</span> Add Guest
                                    </button>
                                </div>

                                {/* Guests Grid */}
                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {guests.length === 0 ? (
                                        <div className="col-span-full bg-white rounded-xl p-8 text-center text-gray-500 border">
                                            No guests yet. Add your first guest!
                                        </div>
                                    ) : (
                                        guests.map(guest => {
                                            const linkedEpisodes = episodes.filter(e => e.guestId === guest.id);
                                            return (
                                                <div key={guest.id} className="bg-white rounded-xl p-5 shadow-sm border hover:shadow-md transition">
                                                    <div className="flex items-start justify-between">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-12 h-12 bg-gradient-to-br from-green-400 to-blue-500 rounded-full flex items-center justify-center text-white text-xl font-bold">
                                                                {guest.name.charAt(0)}
                                                            </div>
                                                            <div>
                                                                <h3 className="font-semibold text-gray-800">{guest.name}</h3>
                                                                <p className="text-sm text-green-600">{guest.areaOfExpertise}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <button
                                                                onClick={() => { setEditingGuest(guest); setShowGuestModal(true); }}
                                                                className="text-blue-600 hover:text-blue-800 p-1"
                                                            >
                                                                ✏️
                                                            </button>
                                                            <button
                                                                onClick={() => handleDeleteGuest(guest.id)}
                                                                className="text-red-600 hover:text-red-800 p-1"
                                                            >
                                                                🗑️
                                                            </button>
                                                        </div>
                                                    </div>
                                                    <p className="text-gray-600 text-sm mt-3 line-clamp-2">{guest.bio}</p>
                                                    <div className="mt-3 pt-3 border-t">
                                                        <p className="text-xs text-gray-500">
                                                            {linkedEpisodes.length > 0 
                                                                ? `📺 ${linkedEpisodes.length} episode${linkedEpisodes.length > 1 ? 's' : ''}: ${linkedEpisodes.map(e => `#${e.episodeNumber}`).join(', ')}`
                                                                : '📺 Not linked to any episode'
                                                            }
                                                        </p>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Episode Modal */}
                    <Modal
                        isOpen={showEpisodeModal}
                        onClose={() => { setShowEpisodeModal(false); setEditingEpisode(null); }}
                        title={editingEpisode ? 'Edit Episode' : 'Create New Episode'}
                    >
                        <EpisodeForm
                            episode={editingEpisode}
                            guests={guests}
                            onSave={handleSaveEpisode}
                            onCancel={() => { setShowEpisodeModal(false); setEditingEpisode(null); }}
                        />
                    </Modal>

                    {/* Guest Modal */}
                    <Modal
                        isOpen={showGuestModal}
                        onClose={() => { setShowGuestModal(false); setEditingGuest(null); }}
                        title={editingGuest ? 'Edit Guest' : 'Add New Guest'}
                    >
                        <GuestForm
                            guest={editingGuest}
                            onSave={handleSaveGuest}
                            onCancel={() => { setShowGuestModal(false); setEditingGuest(null); }}
                        />
                    </Modal>

                    {/* Toast */}
                    {toast && (
                        <Toast
                            message={toast.message}
                            type={toast.type}
                            onClose={() => setToast(null)}
                        />
                    )}

                    {/* Footer */}
                    <footer className="bg-gray-800 text-gray-400 py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <p>Podcast Episode Planner</p>
