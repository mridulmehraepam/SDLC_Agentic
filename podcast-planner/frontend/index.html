<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Pipeline UI - Podcast Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .markdown-content h2 { color: #2563eb; font-size: 1.25rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-content h3 { font-size: 1.1rem; font-weight: 500; margin-top: 1rem; }
        .markdown-content pre { background: #1f2937; color: #4ade80; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.75rem 0; }
        .markdown-content code { background: #f3f4f6; padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-size: 0.875rem; }
        .markdown-content pre code { background: transparent; color: #4ade80; }
        .markdown-content table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
        .markdown-content th { background: #f3f4f6; border: 1px solid #d1d5db; padding: 0.5rem; text-align: left; font-weight: 600; }
        .markdown-content td { border: 1px solid #d1d5db; padding: 0.5rem; }
        .markdown-content ul, .markdown-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
        .markdown-content blockquote { border-left: 4px solid #3b82f6; padding-left: 1rem; color: #6b7280; font-style: italic; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Agent data
        const initialAgents = [
            {
                id: 1,
                name: 'Agent 1',
                role: 'Requirements & Data Models',
                icon: '📋',
                status: 'pending',
                color: 'blue',
                prompt: `Read the file agents/agent1_requirements.md and follow all instructions precisely. 
Append your output to shared/project_context.md under the header "## Section 1: Requirements & Data Models".
Include:
- Episode Management requirements
- Guest Management requirements  
- AI Features (EPAM AI DIAL)
- TypeScript interfaces for Episode, Guest, EpisodeStatus
- Field documentation tables
End with <!-- AGENT_1_COMPLETE -->`,
                outputs: ['Functional Requirements', 'TypeScript Data Models', 'Field Documentation']
            },
            {
                id: 2,
                name: 'Agent 2',
                role: 'Backend API Design',
                icon: '🔌',
                status: 'pending',
                color: 'green',
                prompt: `Read agents/agent2_api.md and follow all instructions.
First read shared/project_context.md to see Section 1.
Append Section 2 under "## Section 2: API Endpoints".
Include:
- 6 Episode endpoints (CRUD + status)
- 6 Guest endpoints (CRUD + linking)
- Request/Response shapes
- Error codes
End with <!-- AGENT_2_COMPLETE -->`,
                outputs: ['Episode Endpoints', 'Guest Endpoints', 'Error Handling']
            },
            {
                id: 3,
                name: 'Agent 3',
                role: 'AI Integration (DIAL)',
                icon: '🤖',
                status: 'pending',
                color: 'purple',
                prompt: `Read agents/agent3_ai.md and follow all instructions.
Review Sections 1-2 in shared/project_context.md.
Append Section 3 under "## Section 3: AI Integration (EPAM AI DIAL)".
Include:
- Script Generator endpoint
- Question Bank endpoint
- Prompt templates
- DIAL API configuration
- Error handling strategy
End with <!-- AGENT_3_COMPLETE -->`,
                outputs: ['DIAL Config', 'Script Generator', 'Question Bank', 'Prompt Templates']
            },
            {
                id: 4,
                name: 'Agent 4',
                role: 'Frontend/UI Components',
                icon: '🎨',
                status: 'pending',
                color: 'orange',
                prompt: `Read agents/agent4_ui.md and follow all instructions.
Review Sections 1-3 in shared/project_context.md.
Append Section 4 under "## Section 4: UI Components & User Flows".
Include:
- 7 React components with TypeScript interfaces
- State management approach
- 3 user flows (Create Episode, Generate Script, Link Guest)
- Loading and error states
End with <!-- AGENT_4_COMPLETE -->`,
                outputs: ['Component Architecture', 'Props Interfaces', 'User Flows', 'State Management']
            },
            {
                id: 5,
                name: 'Agent 5',
                role: 'Diagrams & Documentation',
                icon: '📊',
                status: 'pending',
                color: 'red',
                prompt: `Read agents/agent5_docs.md and follow all instructions.
Review ALL sections in shared/project_context.md.
Append Section 5 under "## Section 5: Sequence Diagrams & Final Documentation".
Include:
- 3 Mermaid sequence diagrams
- System Overview
- Architecture Decisions
- How to Run the Project
- Future Improvements
End with <!-- AGENT_5_COMPLETE -->
Then add <!-- PIPELINE_COMPLETE --> at the very end.`,
                outputs: ['Sequence Diagrams', 'Project Summary', 'Setup Instructions', 'Future Ideas']
            }
        ];

        // Header Component
        function Header() {
            return (
                <header className="bg-gradient-to-r from-blue-600 to-purple-600 text-white">
                    <div className="max-w-7xl mx-auto px-4 py-6">
                        <div className="flex items-center justify-between flex-wrap gap-4">
                            <div>
                                <h1 className="text-2xl font-bold">🎙️ Podcast Episode Planner</h1>
                                <p className="text-blue-100 mt-1">5-Agent Pipeline with EPAM AI DIAL</p>
                            </div>
                            <div className="flex items-center space-x-4">
                                <span className="bg-white/20 px-3 py-1 rounded-full text-sm">
                                    Blackboard Pattern
                                </span>
                                <a
                                    href="https://github.com/mridulmehraepam/SDLC_Agentic"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="bg-white text-blue-600 px-4 py-2 rounded-lg font-medium hover:bg-blue-50 transition"
                                >
                                    View on GitHub
                                </a>
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        // Agent Card Component
        function AgentCard({ agent, onClick, onStatusChange, isSelected }) {
            const statusColors = {
                pending: 'bg-gray-100 border-gray-300',
                running: 'bg-blue-50 border-blue-400',
                complete: 'bg-green-50 border-green-400',
                error: 'bg-red-50 border-red-400'
            };

            const statusIcons = {
                pending: '⏳',
                running: '🔄',
                complete: '✅',
                error: '❌'
            };

            const handleStatusClick = (e) => {
                e.stopPropagation();
                const statuses = ['pending', 'running', 'complete', 'error'];
                const currentIndex = statuses.indexOf(agent.status);
                const nextStatus = statuses[(currentIndex + 1) % statuses.length];
                onStatusChange(nextStatus);
            };

            return (
                <div
                    onClick={onClick}
                    className={`
                        flex-shrink-0 w-40 p-4 rounded-xl border-2 cursor-pointer transition-all
                        ${statusColors[agent.status]}
                        ${isSelected ? 'ring-2 ring-blue-500 ring-offset-2' : ''}
                        ${agent.status === 'running' ? 'animate-pulse' : ''}
                        hover:shadow-lg
                    `}
                >
                    <div className="text-center">
                        <div className="text-3xl mb-2">{agent.icon}</div>
                        <h3 className="font-semibold text-gray-800 text-sm">{agent.name}</h3>
                        <p className="text-xs text-gray-500 mt-1 truncate">{agent.role}</p>
                        
                        <button
                            onClick={handleStatusClick}
                            className="mt-3 inline-flex items-center space-x-1 px-2 py-1 rounded-full text-xs font-medium bg-white shadow-sm hover:shadow"
                        >
                            <span>{statusIcons[agent.status]}</span>
                            <span className="capitalize">{agent.status}</span>
                        </button>
                    </div>
                </div>
            );
        }

        // Agent Pipeline Component
        function AgentPipeline() {
            const [agents, setAgents] = useState(initialAgents);
            const [selectedAgent, setSelectedAgent] = useState(null);

            const handleStatusChange = (agentId, newStatus) => {
                setAgents(prev => 
                    prev.map(agent => 
                        agent.id === agentId ? { ...agent, status: newStatus } : agent
                    )
                );
            };

            const resetPipeline = () => {
                setAgents(initialAgents.map(a => ({ ...a, status: 'pending' })));
                setSelectedAgent(null);
            };

            const copyPrompt = (prompt) => {
                navigator.clipboard.writeText(prompt);
                alert('✅ Prompt copied to clipboard!');
            };

            const completedCount = agents.filter(a => a.status === 'complete').length;

            return (
                <div className="space-y-6">
                    {/* Progress Bar */}
                    <div className="bg-white rounded-lg shadow p-4">
                        <div className="flex items-center justify-between mb-2">
                            <span className="font-medium text-gray-700">Pipeline Progress</span>
                            <span className="text-sm text-gray-500">{completedCount}/5 Agents Complete</span>
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-3">
                            <div 
                                className="bg-gradient-to-r from-blue-500 to-purple-500 h-3 rounded-full transition-all duration-500"
                                style={{ width: `${(completedCount / 5) * 100}%` }}
                            />
                        </div>
                        {completedCount === 5 && (
                            <p className="text-green-600 font-medium mt-2">✅ Pipeline Complete! Check shared/project_context.md</p>
                        )}
                    </div>

                    {/* Pipeline Visualization */}
                    <div className="bg-white rounded-lg shadow p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-xl font-semibold">Agent Pipeline</h2>
                            <button
                                onClick={resetPipeline}
                                className="text-sm text-gray-500 hover:text-gray-700 px-3 py-1 border rounded hover:bg-gray-50"
                            >
                                🔄 Reset
                            </button>
                        </div>

                        {/* Agent Cards */}
                        <div className="flex items-center justify-center gap-2 overflow-x-auto pb-4 flex-wrap">
                            {agents.map((agent, index) => (
                                <React.Fragment key={agent.id}>
                                    <AgentCard
                                        agent={agent}
                                        onClick={() => setSelectedAgent(agent)}
                                        onStatusChange={(status) => handleStatusChange(agent.id, status)}
                                        isSelected={selectedAgent?.id === agent.id}
                                    />
                                    {index < agents.length - 1 && (
                                        <div className="flex-shrink-0 text-gray-400 text-xl hidden sm:block">→</div>
                                    )}
                                </React.Fragment>
                            ))}
                        </div>

                        {/* Shared File Indicator */}
                        <div className="mt-6 p-4 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300">
                            <div className="flex items-center justify-center space-x-2">
                                <span className="text-2xl">📄</span>
                                <span className="font-medium text-gray-700">shared/project_context.md</span>
                                <span className="text-sm text-gray-500">(Blackboard)</span>
                            </div>
                            <p className="text-center text-sm text-gray-500 mt-1">
                                All agents read from and write to this shared file
                            </p>
                        </div>
                    </div>

                    {/* Selected Agent Details */}
                    {selectedAgent && (
                        <div className="bg-white rounded-lg shadow p-6">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-lg font-semibold flex items-center space-x-2">
                                    <span className="text-2xl">{selectedAgent.icon}</span>
                                    <span>{selectedAgent.name}: {selectedAgent.role}</span>
                                </h3>
                                <button
                                    onClick={() => setSelectedAgent(null)}
                                    className="text-gray-400 hover:text-gray-600 text-xl"
                                >
                                    ✕
                                </button>
                            </div>

                            <div className="grid md:grid-cols-2 gap-6">
                                {/* Prompt */}
                                <div>
                                    <h4 className="font-medium text-gray-700 mb-2">📝 Copilot Chat Prompt:</h4>
                                    <div className="bg-gray-900 text-green-400 p-4 rounded-lg font-mono text-sm whitespace-pre-wrap max-h-64 overflow-y-auto">
                                        {selectedAgent.prompt}
                                    </div>
                                    <button
                                        onClick={() => copyPrompt(selectedAgent.prompt)}
                                        className="mt-3 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition w-full sm:w-auto"
                                    >
                                        📋 Copy Prompt to Clipboard
                                    </button>
                                </div>

                                {/* Expected Outputs */}
                                <div>
                                    <h4 className="font-medium text-gray-700 mb-2">📦 Expected Outputs:</h4>
                                    <ul className="space-y-2">
                                        {selectedAgent.outputs.map((output, i) => (
                                            <li key={i} className="flex items-center space-x-2">
                                                <span className="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-sm font-medium">
                                                    {i + 1}
                                                </span>
                                                <span>{output}</span>
                                            </li>
                                        ))}
                                    </ul>

                                    <div className="mt-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
                                        <p className="text-sm text-yellow-800">
                                            <strong>✓ Verification:</strong> Check for{' '}
                                            <code className="bg-yellow-100 px-1 rounded text-xs">
                                                &lt;!-- AGENT_{selectedAgent.id}_COMPLETE --&gt;
                                            </code>
                                        </p>
                                    </div>

                                    <div className="mt-3 p-3 bg-blue-50 border border-blue-200 rounded-lg">
                                        <p className="text-sm text-blue-800">
                                            <strong>💡 Tip:</strong> Click the status button on the card to track progress
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Quick Start Guide */}
                    {!selectedAgent && (
                        <div className="bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg p-6 border border-blue-200">
                            <h3 className="text-lg font-semibold text-blue-800 mb-3">🚀 Quick Start</h3>
                            <ol className="list-decimal pl-5 space-y-2 text-blue-900">
                                <li>Click on <strong>Agent 1</strong> above to see its prompt</li>
                                <li>Copy the prompt and paste it in <strong>VS Code Copilot Chat</strong> (Agent mode)</li>
                                <li>Wait for the agent to complete and verify the output</li>
                                <li>Click the <strong>status button</strong> to mark it complete</li>
                                <li>Proceed to the next agent in sequence</li>
                            </ol>
                        </div>
                    )}
                </div>
            );
        }

        // Instructions Component
        function Instructions() {
            return (
                <div className="bg-white rounded-lg shadow p-6">
                    <h2 className="text-2xl font-bold mb-6">📖 How to Use the Agent Pipeline</h2>
                    
                    <div className="space-y-6">
                        <section className="p-4 bg-blue-50 rounded-lg border-l-4 border-blue-500">
                            <h3 className="text-lg font-semibold text-blue-700 mb-2">Step 1: Open VS Code Copilot Chat</h3>
                            <p className="text-gray-700">Press <kbd className="bg-white px-2 py-1 rounded border font-mono text-sm shadow-sm">Ctrl + Shift + I</kbd> to open the Copilot Chat panel</p>
                        </section>

                        <section className="p-4 bg-green-50 rounded-lg border-l-4 border-green-500">
                            <h3 className="text-lg font-semibold text-green-700 mb-2">Step 2: Set Mode to "Agent"</h3>
                            <p className="text-gray-700">At the bottom of the chat input, click the mode selector and choose <strong>"Agent"</strong> (not "Ask" or "Edit")</p>
                            <p className="text-sm text-green-600 mt-2">⚠️ This is critical — Agent mode lets Copilot read and write files</p>
                        </section>

                        <section className="p-4 bg-purple-50 rounded-lg border-l-4 border-purple-500">
                            <h3 className="text-lg font-semibold text-purple-700 mb-2">Step 3: Run Each Agent</h3>
                            <p className="text-gray-700 mb-3">Click each agent card to see and copy its prompt. Run them in order:</p>
                            
                            <div className="grid grid-cols-5 gap-2 text-center text-sm">
                                <div className="bg-white p-2 rounded shadow-sm">📋 Agent 1</div>
                                <div className="bg-white p-2 rounded shadow-sm">🔌 Agent 2</div>
                                <div className="bg-white p-2 rounded shadow-sm">🤖 Agent 3</div>
                                <div className="bg-white p-2 rounded shadow-sm">🎨 Agent 4</div>
                                <div className="bg-white p-2 rounded shadow-sm">📊 Agent 5</div>
                            </div>
                            
                            <div className="bg-yellow-100 border border-yellow-300 rounded-lg p-4 mt-4">
                                <p className="text-yellow-800 font-medium">⚠️ Important Rules:</p>
                                <ul className="text-yellow-700 text-sm mt-2 space-y-1 list-disc pl-5">
                                    <li>Run agents in order: 1 → 2 → 3 → 4 → 5</li>
                                    <li>Verify each agent completes before running the next</li>
                                    <li>Check for completion markers in the output file</li>
                                    <li>If an agent fails, fix the issue before proceeding</li>
                                </ul>
                            </div>
                        </section>

                        <section className="p-4 bg-orange-50 rounded-lg border-l-4 border-orange-500">
                            <h3 className="text-lg font-semibold text-orange-700 mb-2">Step 4: Verify Output</h3>
                            <p className="text-gray-700 mb-2">After each agent, open <code className="bg-white px-2 py-1 rounded border font-mono text-sm">shared/project_context.md</code> and check:</p>
                            <ul className="list-none space-y-1 text-gray-700">
                                <li>✅ Section header exists (e.g., <code className="bg-white px-1 rounded text-xs">## Section 1: ...</code>)</li>
                                <li>✅ Content is complete (not cut off mid-sentence)</li>
                                <li>✅ Completion marker present (e.g., <code className="bg-white px-1 rounded text-xs">&lt;!-- AGENT_1_COMPLETE --&gt;</code>)</li>
                            </ul>
                        </section>

                        <section className="border-t pt-6">
                            <h3 className="text-lg font-semibold text-gray-800 mb-3">🔧 Troubleshooting</h3>
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="text-left p-3 border font-semibold">Problem</th>
                                        <th className="text-left p-3 border font-semibold">What to Type in Copilot</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td className="p-3 border">Section incomplete / cut off</td>
                                        <td className="p-3 border font-mono text-xs bg-gray-50">Continue writing Section N from where you stopped. End with &lt;!-- AGENT_N_COMPLETE --&gt;</td>
                                    </tr>
                                    <tr>
                                        <td className="p-3 border">Wrong file edited</td>
                                        <td className="p-3 border font-mono text-xs bg-gray-50">Move the content to shared/project_context.md under the correct header</td>
                                    </tr>
                                    <tr>
                                        <td className="p-3 border">Previous section missing</td>
                                        <td className="p-3 border font-mono text-xs bg-gray-50">Section N-1 is incomplete. Stop and report what's missing.</td>
                                    </tr>
                                    <tr>
                                        <td className="p-3 border">Output too brief</td>
                                        <td className="p-3 border font-mono text-xs bg-gray-50">Section N is too brief. Re-read the agent prompt and expand with full detail.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </section>

                        <section className="bg-green-50 rounded-lg p-4 border border-green-200">
                            <h3 className="text-lg font-semibold text-green-800 mb-2">✅ Final Checklist</h3>
                            <p className="text-green-700 mb-2">When complete, <code className="bg-white px-1 rounded">shared/project_context.md</code> should contain:</p>
                            <ul className="list-none space-y-1 text-green-700 text-sm">
                                <li>□ Section 1: Requirements & Data Models + <code className="bg-white px-1 rounded text-xs">&lt;!-- AGENT_1_COMPLETE --&gt;</code></li>
                                <li>□ Section 2: API Endpoints + <code className="bg-white px-1 rounded text-xs">&lt;!-- AGENT_2_COMPLETE --&gt;</code></li>
                                <li>□ Section 3: AI Integration + <code className="bg-white px-1 rounded text-xs">&lt;!-- AGENT_3_COMPLETE --&gt;</code></li>
                                <li>□ Section 4: UI Components + <code className="bg-white px-1 rounded text-xs">&lt;!-- AGENT_4_COMPLETE --&gt;</code></li>
                                <li>□ Section 5: Diagrams & Docs + <code className="bg-white px-1 rounded text-xs">&lt;!-- AGENT_5_COMPLETE --&gt;</code></li>
                                <li>□ Final line: <code className="bg-white px-1 rounded text-xs">&lt;!-- PIPELINE_COMPLETE --&gt;</code></li>
                            </ul>
                        </section>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [activeTab, setActiveTab] = useState('pipeline');

            return (
                <div className="min-h-screen bg-gray-50">
                    <Header />
                    
                    {/* Tab Navigation */}
                    <div className="bg-white border-b sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4">
                            <nav className="flex space-x-8">
                                <button
                                    onClick={() => setActiveTab('pipeline')}
                                    className={`py-4 px-1 border-b-2 font-medium text-sm transition ${
                                        activeTab === 'pipeline'
                                            ? 'border-blue-500 text-blue-600'
                                            : 'border-transparent text-gray-500 hover:text-gray-700'
                                    }`}
                                >
                                    🤖 Agent Pipeline
                                </button>
                                <button
                                    onClick={() => setActiveTab('instructions')}
                                    className={`py-4 px-1 border-b-2 font-medium text-sm transition ${
                                        activeTab === 'instructions'
                                            ? 'border-blue-500 text-blue-600'
                                            : 'border-transparent text-gray-500 hover:text-gray-700'
                                    }`}
                                >
                                    📖 How to Use
                                </button>
                            </nav>
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 py-6">
                        {activeTab === 'pipeline' && <AgentPipeline />}
                        {activeTab === 'instructions' && <Instructions />}
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-gray-400 py-6 mt-12">
                        <div className="max-w-7xl mx-auto px-4 text-center">
                            <p className="font-medium text-white">Podcast Episode Planner - 5-Agent Pipeline</p>
                            <p className="text-sm mt-1">Using Blackboard Pattern with EPAM AI DIAL</p>
                            <p className="text-xs mt-2 text-gray-500">Built for SDLC Agentic Demo</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
